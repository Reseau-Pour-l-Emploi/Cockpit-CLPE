/* ─── CHARGEMENT CSV ──────────────────────────────────── */
function parseCSV(text) {
  const result = Papa.parse(text.trim(), {header:true, skipEmptyLines:true, dynamicTyping:true});
  return result.data;
}
async function loadAllData() {
  const base = document.querySelector('base')?.href || window.location.href.replace(/[^/]*$/, '');
  const [barRaw, freqRaw, fichesRaw] = await Promise.all([
    fetch(base + 'data/barometre.csv').then(r => r.text()),
    fetch(base + 'data/frequentation_rpe.csv').then(r => r.text()),
    fetch(base + 'data/fiches_actions.csv').then(r => r.text()),
  ]);
  return {
    barometre:    parseCSV(barRaw),
    frequentation: parseCSV(freqRaw),
    fiches:       parseCSV(fichesRaw),
  };
}

/* ─── TRANSFORMATION DONNÉES ──────────────────────────── */
function buildBarometreForCLPE(rows, clpeId) {
  const clpeRows = rows.filter(r => r.clpe_id === clpeId);
  const quarters = [...new Set(clpeRows.map(r => r.trimestre))].sort();
  return quarters.map(trimestre => {
    const qRows = clpeRows.filter(r => r.trimestre === trimestre);
    const first = qRows[0] || {};
    const themes = THEMES_META.map(tm => {
      const tRows = qRows.filter(r => r.theme_id === tm.id);
      const score_moyen = tRows.length
        ? parseFloat((tRows.reduce((s,r)=>s+(r.score||0),0)/tRows.length).toFixed(2))
        : null;
      const questions = tRows.map(r => ({texte: r.question_texte, score: r.score||0}));
      return {...tm, score_moyen, questions};
    }).filter(t => t.score_moyen !== null);
    const validThemes = themes.filter(t => t.score_moyen !== null);
    const score_global = first.score_global
      ? parseFloat(first.score_global)
      : validThemes.length
        ? parseFloat((validThemes.reduce((s,t)=>s+t.score_moyen,0)/validThemes.length).toFixed(2))
        : 0;
    return {trimestre, themes: validThemes, score_global, repondants: first.repondants || 0};
  });
}

/* ─── UTILITAIRES UI ──────────────────────────────────── */
const scoreCol = s => {const p=(s/5)*100;return p>=75?"#16a34a":p>=55?"#ca8a04":p>=38?"#ea580c":"#dc2626";};

function ScoreGauge({score,size=52}) {
  const r=14,circ=2*Math.PI*r,fill=((score/5)*circ).toFixed(1),col=scoreCol(score);
  return (
    <div style={{width:size,height:size,position:"relative",flexShrink:0}}>
      <svg viewBox="0 0 40 40" style={{width:"100%",height:"100%",transform:"rotate(-90deg)"}}>
        <circle cx={20} cy={20} r={r} fill="none" stroke="#e5e7eb" strokeWidth="4"/>
        <circle cx={20} cy={20} r={r} fill="none" stroke={col} strokeWidth="4"
          strokeDasharray={`${fill} ${circ}`} strokeLinecap="round"/>
      </svg>
      <span style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",
        fontSize:size<50?9:11,fontWeight:700,color:col}}>{score.toFixed(1)}</span>
    </div>
  );
}
function Trend({curr,prev}) {
  if(prev==null)return null;
  const d=curr-prev,col=Math.abs(d)<0.05?"#9ca3af":d>0?"#16a34a":"#dc2626";
  return <span style={{fontSize:11,fontWeight:700,color:col,marginLeft:4}}>
    {Math.abs(d)<0.05?"→":d>0?"↑":"↓"} {d>0?"+":""}{d.toFixed(2)}
  </span>;
}
function ProgBar({value,max=5,h=7}) {
  return <div style={{height:h,borderRadius:99,background:"#e5e7eb",overflow:"hidden",flex:1}}>
    <div style={{height:"100%",width:`${Math.min((value/max)*100,100)}%`,background:scoreCol(value),borderRadius:99,transition:"width .5s"}}/>
  </div>;
}
function Tag({ok,label}) {
  return <span style={{fontSize:11,fontWeight:600,padding:"2px 8px",borderRadius:99,
    background:ok?"#dcfce7":"#fee2e2",color:ok?"#15803d":"#dc2626"}}>{ok?"✓":"✗"} {label}</span>;
}
function Card({children,style={}}) {

}

}

  return (

/* ─── CARTE ───────────────────────────────────────────── */
function MapView({selRegion,selCLPE,onRegion,onCLPE,onBack,allData}) {
  const [hov,setHov]=useState(null);

  // ── Vue région zoomée ──
  if(selRegion) {
    const rCLPEs=CLPES.filter(c=>c.regionId===selRegion.id);
    const mp=REGION_MAP[selRegion.id];
    const [x0,y0,x1,y1]=mp?.bb||[0,0,100,100];

    return (
      <div style={{padding:"24px 28px"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:20}}>

          <span style={{color:"#94a3b8"}}>/</span>

        </div>
        <div style={{display:"flex",gap:28,flexWrap:"wrap"}}>
          {/* Carte zoomée */}
          <div style={{flex:"0 0 auto"}}>
            <p style={{fontSize:12,color:"#64748b",marginBottom:8,fontWeight:500}}>
              Localisation des CLPE dans la région</p>
            <div style={{background:"#f8fafc",borderRadius:16,border:"1px solid #e2e8f0",
              padding:8,display:"inline-block"}}>
              <svg viewBox={vb} style={{width:280,height:280,display:"block"}}>
                <path d={mp?.d} fill={selRegion.color} opacity={0.12}
                  stroke={selRegion.color} strokeWidth="1.5" strokeDasharray="5 3"/>
                {rCLPEs.map(c=>{
                  const isSel=selCLPE?.id===c.id,isH=hov===c.id;
                  return (
                    <g key={c.id} style={{cursor:"pointer"}}
                      onClick={()=>onCLPE(c)}
                      onMouseEnter={()=>setHov(c.id)} onMouseLeave={()=>setHov(null)}>
                      <circle cx={c.pos[0]} cy={c.pos[1]} r={isSel?10:7}
                        fill={isSel||isH?selRegion.color:"white"}
                        stroke={selRegion.color} strokeWidth="2"
                        style={{transition:"all .2s",
                          filter:isSel?`drop-shadow(0 2px 6px ${selRegion.color}99)`:"none"}}/>
                      {isSel&&<circle cx={c.pos[0]} cy={c.pos[1]} r={14}
                        fill="none" stroke={selRegion.color} strokeWidth="1.5" opacity={0.4}/>}
                      {(isH||isSel)&&<text x={c.pos[0]} y={c.pos[1]-15}
                        textAnchor="middle" fontSize="7" fontWeight="700" fill="#0f172a"
                        style={{pointerEvents:"none"}}>
                        {c.nom.replace("CLPE ","")}
                      </text>}
                    </g>
                  );
                })}
              </svg>
            </div>
          </div>
          {/* Grille CLPE */}
          <div style={{flex:1,minWidth:280}}>
            <p style={{fontSize:12,color:"#64748b",marginBottom:8,fontWeight:500}}>
              {rCLPEs.length} CLPE{rCLPEs.length>1?"s":""} dans cette région</p>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(230px,1fr))",gap:12}}>
              {rCLPEs.map(clpe=>{
                const barRows = allData.barometre.filter(r=>r.clpe_id===clpe.id);
                const quarters = [...new Set(barRows.map(r=>r.trimestre))].sort();
                const lastQ = quarters[quarters.length-1];
                const prevQ = quarters[quarters.length-2];
                const lastScore = lastQ ? parseFloat(barRows.find(r=>r.trimestre===lastQ&&r.score_global)?.score_global||0) : null;
                const prevScore = prevQ ? parseFloat(barRows.find(r=>r.trimestre===prevQ&&r.score_global)?.score_global||0) : null;
                const lastRep = lastQ ? barRows.find(r=>r.trimestre===lastQ)?.repondants||0 : 0;
                const fichesRows = allData.fiches.filter(r=>r.clpe_id===clpe.id);
                const lastFiche = fichesRows[fichesRows.length-1];
                const isSel=selCLPE?.id===clpe.id;
                return (
                  <button key={clpe.id} onClick={()=>onCLPE(clpe)}
                    onMouseEnter={()=>setHov(clpe.id)} onMouseLeave={()=>setHov(null)}
                    style={{textAlign:"left",padding:16,borderRadius:14,cursor:"pointer",
                      border:`2px solid ${isSel?selRegion.color:hov===clpe.id?"#cbd5e1":"#e2e8f0"}`,
                      background:isSel?`${selRegion.color}0d`:"white",transition:"all .2s",
                      boxShadow:isSel?`0 4px 16px ${selRegion.color}22`:"none"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                      <div>
                        <div style={{fontWeight:700,fontSize:13,color:"#0f172a"}}>{clpe.nom}</div>
                        <div style={{fontSize:11,color:"#64748b",marginTop:2}}>{clpe.departement}</div>
                      </div>
                      {lastScore>0&&<ScoreGauge score={lastScore} size={44}/>}
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                      <div style={{background:"#f8fafc",borderRadius:8,padding:"6px 8px",textAlign:"center"}}>
                        <div style={{fontSize:18,fontWeight:700,color:"#0f172a"}}>{lastFiche?.en_cours??"—"}</div>
                        <div style={{fontSize:10,color:"#64748b"}}>Fiches actions</div>
                      </div>
                      <div style={{background:"#f8fafc",borderRadius:8,padding:"6px 8px",textAlign:"center"}}>

                        <div style={{fontSize:10,color:"#64748b"}}>Répondants</div>
                      </div>
                    </div>
                    {lastScore>0&&<div style={{marginTop:8,fontSize:11,color:"#64748b"}}>
                      Score : <strong style={{color:scoreCol(lastScore)}}>{lastScore.toFixed(2)}/5</strong>
                      {prevScore>0&&<Trend curr={lastScore} prev={prevScore}/>}
                    </div>}
                  </button>
                );
              })}
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ── Carte nationale ──
  return (

        Carte nationale des régions</h2>
      <p style={{fontSize:13,color:"#64748b",marginBottom:20}}>
        Cliquez sur une région pour accéder à ses Comités Locaux Pour l'Emploi</p>
      <div style={{display:"flex",gap:28,flexWrap:"wrap",alignItems:"flex-start"}}>
        <div style={{flex:"0 0 auto",position:"relative"}}>
          <svg viewBox="0 0 490 490" style={{width:"min(460px,100%)",filter:"drop-shadow(0 4px 24px rgba(0,0,0,.1))"}}>

              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
            {REGIONS.map(r=>{
              const mp=REGION_MAP[r.id];if(!mp)return null;
              const isH=hov===r.id,n=CLPES.filter(c=>c.regionId===r.id).length;
              const cx=(mp.bb[0]+mp.bb[2])/2,cy=(mp.bb[1]+mp.bb[3])/2;
              return (
                <g key={r.id} style={{cursor:"pointer"}}
                  onMouseEnter={()=>setHov(r.id)} onMouseLeave={()=>setHov(null)}
                  onClick={()=>onRegion(r)}>
                  <path d={mp.d} fill={r.color} stroke="white" strokeWidth="1.8"
                    opacity={isH?1:0.82}
                    style={{transition:"opacity .2s",filter:isH?"url(#gl)":"none"}}/>
                  {n>0&&<text x={cx} y={cy} textAnchor="middle" dominantBaseline="middle"
                    fontSize={r.id==="idf"?7:9} fill="white" fontWeight="700"
                    style={{pointerEvents:"none",userSelect:"none",opacity:.9}}>{n}</text>}
                </g>
              );
            })}
          </svg>
          <div style={{position:"absolute",bottom:8,right:8,background:"white",borderRadius:8,
            padding:"5px 10px",fontSize:11,color:"#64748b",
            boxShadow:"0 2px 8px rgba(0,0,0,.1)",border:"1px solid #e2e8f0"}}>
            Chiffres = nombre de CLPE</div>
        </div>
        <div style={{flex:1,minWidth:200}}>
          <p style={{fontSize:12,fontWeight:600,color:"#64748b",marginBottom:8,
            textTransform:"uppercase",letterSpacing:"0.05em"}}>13 régions métropolitaines</p>
          <div style={{display:"flex",flexDirection:"column",gap:3}}>
            {REGIONS.map(r=>{
              const n=CLPES.filter(c=>c.regionId===r.id).length;
              return (
                <button key={r.id} onClick={()=>onRegion(r)}
                  onMouseEnter={()=>setHov(r.id)} onMouseLeave={()=>setHov(null)}
                  style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",
                    borderRadius:8,border:"1.5px solid transparent",cursor:"pointer",textAlign:"left",
                    background:hov===r.id?"#f1f5f9":"transparent",
                    borderColor:hov===r.id?"#e2e8f0":"transparent",transition:"all .15s"}}>
                  <div style={{width:11,height:11,borderRadius:"50%",background:r.color,flexShrink:0}}/>
                  <span style={{fontSize:13,color:"#1e293b",flex:1}}>{r.nom}</span>
                  {n>0&&<span style={{fontSize:11,background:"#f1f5f9",color:"#475569",
                    borderRadius:99,padding:"1px 8px",fontWeight:600}}>{n} CLPE</span>}
                </button>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── BAROMÈTRE ───────────────────────────────────────── */
function BarometreView({clpe,allData}) {
  const [tri,setTri]=useState(null),[openT,setOpenT]=useState({});
  const barData = useMemo(()=>clpe?buildBarometreForCLPE(allData.barometre,clpe.id):[],[clpe,allData]);
  const quarters = useMemo(()=>barData.map(d=>d.trimestre),[barData]);

  useEffect(()=>{if(quarters.length)setTri(quarters[quarters.length-1]);},[quarters.join(",")]);

  const idx=quarters.indexOf(tri);
  const curr=barData[idx]??null;
  const prev=idx>0?barData[idx-1]:null;
  const evolData=useMemo(()=>barData.map(d=>{
    const row={name:d.trimestre,"Score global":d.score_global};
    d.themes.forEach(t=>{row[t.nom.split(" ")[0]]=t.score_moyen;});
    return row;
  }),[barData]);

  if(!clpe)return <Empty icon="📊" text="Sélectionnez un CLPE pour afficher le baromètre"/>;
  if(!barData.length)return <Empty icon="📊" text="Aucune donnée baromètre pour ce CLPE"/>;

  return (
    <div style={{padding:"24px 28px",display:"flex",flexDirection:"column",gap:20}}>
      <div style={{display:"flex",flexWrap:"wrap",justifyContent:"space-between",alignItems:"flex-start",gap:12}}>
        <div>
          <h2 style={{fontFamily:"'Spectral',serif",fontSize:20,fontWeight:700,color:"#0f172a"}}>
            Baromètre de maturité</h2>
          <p style={{fontSize:13,color:"#64748b",marginTop:2}}>{clpe.nom} · {clpe.departement}</p>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {quarters.map(q=>(
            <button key={q} onClick={()=>setTri(q)}
              style={{padding:"7px 14px",borderRadius:8,border:"1.5px solid",cursor:"pointer",
                borderColor:tri===q?"#1e3a8a":"#e2e8f0",
                background:tri===q?"#1e3a8a":"white",
                color:tri===q?"white":"#475569",
                fontSize:12,fontWeight:600,transition:"all .2s"}}>{q}</button>
          ))}
        </div>
      </div>

      {curr&&<>
        {/* Hero */}
        <div style={{borderRadius:16,padding:"24px 28px",
          background:"linear-gradient(135deg,#0f172a 0%,#1e3a8a 60%,#1d4ed8 100%)",
          color:"white",display:"flex",flexWrap:"wrap",gap:16,alignItems:"center"}}>
          <div style={{flex:1,minWidth:180}}>
            <p style={{fontSize:11,fontWeight:600,textTransform:"uppercase",
              letterSpacing:"0.08em",color:"#93c5fd",marginBottom:8}}>Score de maturité global</p>
            <div style={{display:"flex",alignItems:"baseline",gap:12}}>
              <span style={{fontSize:52,fontWeight:800,lineHeight:1,fontFamily:"'Spectral',serif"}}>
                {curr.score_global.toFixed(2)}</span>
              <span style={{color:"#93c5fd",fontSize:18}}>/5</span>
              {prev&&<span style={{fontSize:18,fontWeight:700,
                color:curr.score_global>=prev.score_global?"#86efac":"#fca5a5"}}>
                {curr.score_global>=prev.score_global?"↑":"↓"} {Math.abs(curr.score_global-prev.score_global).toFixed(2)}
              </span>}
            </div>
            {prev&&<p style={{fontSize:12,color:"#93c5fd",marginTop:4}}>Trimestre précédent : {prev.score_global.toFixed(2)}/5</p>}
          </div>
          <div style={{textAlign:"right"}}>
            <p style={{fontSize:11,fontWeight:600,textTransform:"uppercase",
              letterSpacing:"0.08em",color:"#93c5fd",marginBottom:8}}>Répondants</p>
            <div style={{fontSize:44,fontWeight:800,lineHeight:1,fontFamily:"'Spectral',serif"}}>
              {curr.repondants}</div>
            {prev&&<p style={{fontSize:12,color:"#93c5fd",marginTop:4}}>
              Précédent : {prev.repondants}
              {prev.repondants!==curr.repondants&&<Trend curr={curr.repondants} prev={prev.repondants}/>}
            </p>}
          </div>
        </div>

        {/* Radar + évolution */}
        <div style={{display:"flex",gap:18,flexWrap:"wrap"}}>
          {curr.themes.length>0&&(
            <Card style={{flex:"0 0 auto"}}>
              <p style={{fontWeight:700,fontSize:14,color:"#0f172a",marginBottom:10}}>Vue par thématique</p>
              <ResponsiveContainer width={260} height={210}>
                <RadarChart data={curr.themes.map(t=>({subject:t.nom.split(" ")[0],score:t.score_moyen,fullMark:5}))}>
                  <PolarGrid stroke="#f1f5f9"/>
                  <PolarAngleAxis dataKey="subject" tick={{fontSize:11,fill:"#475569"}}/>
                  <PolarRadiusAxis domain={[0,5]} tick={{fontSize:9,fill:"#94a3b8"}}/>
                  <Radar dataKey="score" stroke="#1e3a8a" fill="#1e3a8a" fillOpacity={0.25} strokeWidth={2}/>
                </RadarChart>
              </ResponsiveContainer>
            </Card>
          )}
          <Card style={{flex:1,minWidth:260}}>
            <p style={{fontWeight:700,fontSize:14,color:"#0f172a",marginBottom:10}}>Évolution trimestrielle</p>
            <ResponsiveContainer width="100%" height={210}>
              <LineChart data={evolData}>
                <CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9"/>
                <XAxis dataKey="name" tick={{fontSize:11}}/><YAxis domain={[0,5]} tick={{fontSize:11}}/>
                <Tooltip contentStyle={{borderRadius:8,fontSize:12}}/><Legend wrapperStyle={{fontSize:11}}/>
                <Line type="monotone" dataKey="Score global" stroke="#1e3a8a" strokeWidth={3} dot={{r:4}}/>
                {THEMES_META.map((t,i)=>(
                  <Line key={t.id} type="monotone" dataKey={t.nom.split(" ")[0]}
                    stroke={["#3b82f6","#16a34a","#ca8a04","#9333ea"][i]}
                    strokeWidth={1.5} strokeDasharray="5 3" dot={{r:3}}/>
                ))}
              </LineChart>
            </ResponsiveContainer>
          </Card>
        </div>

        {/* Accordion thèmes */}
        <div>
          <p style={{fontWeight:700,fontSize:14,color:"#0f172a",marginBottom:10}}>Résultats détaillés par thématique</p>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {curr.themes.map(theme=>{
              const prevT=prev?.themes.find(t=>t.id===theme.id);
              const isOpen=openT[theme.id];
              return (
                <div key={theme.id} style={{background:"white",borderRadius:12,border:"1.5px solid #e2e8f0",overflow:"hidden"}}>
                  <button onClick={()=>setOpenT(p=>({...p,[theme.id]:!p[theme.id]}))}
                    style={{width:"100%",display:"flex",alignItems:"center",gap:14,padding:"14px 18px",
                      background:"none",border:"none",cursor:"pointer",textAlign:"left"}}
                    onMouseEnter={e=>e.currentTarget.style.background="#f8fafc"}
                    onMouseLeave={e=>e.currentTarget.style.background="none"}>
                    <span style={{fontSize:18}}>{theme.icon}</span>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
                        <span style={{fontWeight:700,fontSize:14,color:"#0f172a"}}>{theme.nom}</span>
                        {prevT&&<Trend curr={theme.score_moyen} prev={prevT.score_moyen}/>}
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <ProgBar value={theme.score_moyen}/>
                        <span style={{fontSize:12,fontWeight:700,color:scoreCol(theme.score_moyen),flexShrink:0}}>
                          {theme.score_moyen.toFixed(2)}/5</span>
                      </div>
                    </div>
                    <span style={{color:"#94a3b8",fontSize:13,transform:isOpen?"rotate(180deg)":"none",
                      transition:"transform .2s",flexShrink:0}}>▼</span>
                  </button>
                  {isOpen&&(
                    <div style={{borderTop:"1px solid #f1f5f9"}}>
                      {theme.questions.map((q,qi)=>{
                        const prevQ=prevT?.questions?.[qi];
                        return (
                          <div key={qi} style={{display:"flex",alignItems:"center",gap:12,
                            padding:"10px 18px 10px 50px",background:"#fafbfc",
                            borderBottom:qi<theme.questions.length-1?"1px solid #f1f5f9":"none"}}>
                            <div style={{flex:1}}>
                              <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                                <span style={{fontSize:12.5,color:"#374151"}}>{q.texte}</span>
                                <div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0,marginLeft:12}}>
                                  <span style={{fontSize:13,fontWeight:700,color:scoreCol(q.score)}}>{q.score.toFixed(2)}</span>
                                  {prevQ&&<Trend curr={q.score} prev={prevQ.score}/>}
                                </div>
                              </div>
                              <ProgBar value={q.score} h={4}/>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      </>}
    </div>
  );
}

/* ─── FRÉQUENTATION RPE ───────────────────────────────── */
function FreqView({clpe,allData}) {
  const rows = useMemo(()=>clpe?allData.frequentation.filter(r=>r.clpe_id===clpe.id).sort((a,b)=>a.trimestre.localeCompare(b.trimestre)):[],[clpe,allData]);
  const last=rows[rows.length-1],prev=rows[rows.length-2];
  if(!clpe)return <Empty icon="📈" text="Sélectionnez un CLPE pour afficher les statistiques RPE"/>;
  if(!rows.length)return <Empty icon="📈" text="Aucune donnée RPE pour ce CLPE"/>;
  const kpis=[
    {key:"connexions",   label:"Connexions",          icon:"🔗",d:0},
    {key:"utilisateurs", label:"Utilisateurs uniques", icon:"👥",d:0},
    {key:"sessions",     label:"Sessions totales",     icon:"📋",d:0},
    {key:"taux_retour",  label:"Taux de retour",       icon:"🔄",d:1,u:"%"},
  ];
  return (
    <div style={{padding:"24px 28px",display:"flex",flexDirection:"column",gap:20}}>
      <div>
        <h2 style={{fontFamily:"'Spectral',serif",fontSize:20,fontWeight:700,color:"#0f172a"}}>
          Fréquentation du tableau de bord RPE</h2>

      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:14}}>
        {kpis.map(k=>{
          const val=last?.[k.key],pval=prev?.[k.key],diff=val!=null&&pval!=null?val-pval:null,isPos=diff>0;
          return (
            <Card key={k.key}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                <span style={{fontSize:22}}>{k.icon}</span>
                {diff!=null&&<span style={{fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:99,
                  background:isPos?"#dcfce7":"#fee2e2",color:isPos?"#15803d":"#dc2626"}}>
                  {isPos?"+":""}{diff.toFixed(k.d)}{k.u||""}</span>}
              </div>
              <div style={{fontSize:30,fontWeight:800,color:"#0f172a",lineHeight:1}}>
                {val?.toFixed(k.d)}{k.u||""}</div>
              <div style={{fontSize:12,color:"#64748b",marginTop:4}}>{k.label}</div>
              {pval!=null&&<div style={{fontSize:11,color:"#94a3b8",marginTop:3}}>
                Préc. : {pval.toFixed(k.d)}{k.u||""}</div>}
            </Card>
          );
        })}
      </div>
      <Card>
        <p style={{fontWeight:700,fontSize:14,color:"#0f172a",marginBottom:14}}>Connexions & Sessions par trimestre</p>
        <ResponsiveContainer width="100%" height={230}>
          <BarChart data={rows} barCategoryGap="28%">
            <CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9"/>
            <XAxis dataKey="trimestre" tick={{fontSize:11}}/><YAxis tick={{fontSize:11}}/>
            <Tooltip contentStyle={{borderRadius:8,fontSize:12}}/><Legend wrapperStyle={{fontSize:12}}/>
            <Bar dataKey="connexions" name="Connexions" fill="#1e3a8a" radius={[5,5,0,0]}/>
            <Bar dataKey="sessions"   name="Sessions"   fill="#60a5fa" radius={[5,5,0,0]}/>
          </BarChart>
        </ResponsiveContainer>
      </Card>
      <Card>
        <p style={{fontWeight:700,fontSize:14,color:"#0f172a",marginBottom:14}}>Utilisateurs & Taux de retour</p>
        <ResponsiveContainer width="100%" height={220}>
          <LineChart data={rows}>
            <CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9"/>
            <XAxis dataKey="trimestre" tick={{fontSize:11}}/>
            <YAxis yAxisId="l" tick={{fontSize:11}}/>
            <YAxis yAxisId="r" orientation="right" unit="%" tick={{fontSize:11}}/>
            <Tooltip contentStyle={{borderRadius:8,fontSize:12}}/><Legend wrapperStyle={{fontSize:12}}/>
            <Line yAxisId="l" type="monotone" dataKey="utilisateurs" name="Utilisateurs"
              stroke="#16a34a" strokeWidth={2.5} dot={{r:4}}/>
            <Line yAxisId="r" type="monotone" dataKey="taux_retour" name="Taux retour (%)"
              stroke="#ea580c" strokeWidth={2} strokeDasharray="5 4" dot={{r:3}}/>
          </LineChart>
        </ResponsiveContainer>
      </Card>
    </div>
  );
}

/* ─── FICHES ACTIONS ──────────────────────────────────── */
function FichesView({clpe,allData}) {
  const [tab,setTab]=useState("creees");
  const rows = useMemo(()=>clpe?allData.fiches.filter(r=>r.clpe_id===clpe.id).sort((a,b)=>a.trimestre.localeCompare(b.trimestre)):[],[clpe,allData]);
  const last=rows[rows.length-1],prev=rows[rows.length-2];
  if(!clpe)return <Empty icon="📄" text="Sélectionnez un CLPE pour afficher les fiches actions"/>;
  if(!rows.length)return <Empty icon="📄" text="Aucune donnée fiches actions pour ce CLPE"/>;

  const qs=(row,pfx)=>row?[
    {name:"Faisabilité",v:+row[`${pfx}_faisabilite`],c:"#1e3a8a"},
    {name:"Impact",v:+row[`${pfx}_impact`],c:"#2563eb"},
    {name:"Complétude",v:+row[`${pfx}_completude`],c:"#16a34a"},
    {name:"Innovation",v:+row[`${pfx}_innovation`],c:"#9333ea"},
  ]:[];
  const scores=qs(last,tab),pscores=qs(prev,tab);
  const avg=scores.length?parseFloat((scores.reduce((s,q)=>s+q.v,0)/scores.length).toFixed(2)):0;
  const pavg=pscores.length?pscores.reduce((s,q)=>s+q.v,0)/pscores.length:null;

  return (
    <div style={{padding:"24px 28px",display:"flex",flexDirection:"column",gap:20}}>

        <h2 style={{fontFamily:"'Spectral',serif",fontSize:20,fontWeight:700,color:"#0f172a"}}>
          Fiches Actions & Feuilles de route</h2>
        <p style={{fontSize:13,color:"#64748b",marginTop:2}}>{clpe.nom} · Dernier trimestre : {last?.trimestre}</p>
      </div>

      {/* Métriques */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:14}}>
        {[
          {label:"Créées ce trimestre",val:last?.creees,        pval:prev?.creees,         icon:"✏️"},
          {label:"Stock en cours",      val:last?.en_cours,      pval:prev?.en_cours,       icon:"📦"},
          {label:"Actualisées <3 mois", val:last?.pct_actualisees,pval:prev?.pct_actualisees,icon:"🔄",d:1,u:"%"},
        ].map(item=>(
          <Card key={item.label}>
            <div style={{fontSize:22,marginBottom:8}}>{item.icon}</div>
            <div style={{fontSize:32,fontWeight:800,color:"#0f172a",lineHeight:1}}>
              {item.val?.toFixed(item.d??0)}{item.u||""}</div>
            <div style={{fontSize:12,color:"#64748b",marginTop:4}}>{item.label}</div>
            {item.pval!=null&&<div style={{fontSize:11,color:"#94a3b8",marginTop:3}}>
              Préc. : {(+item.pval).toFixed(item.d??0)}{item.u||""}
              <Trend curr={+item.val} prev={+item.pval}/></div>}
          </Card>
        ))}
        <Card>
          <div style={{fontSize:22,marginBottom:10}}>🗺️</div>
          <p style={{fontSize:13,fontWeight:700,color:"#0f172a",marginBottom:10}}>Feuille de route</p>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            <Tag ok={last?.feuille_de_route==1} label="Présente"/>
            <Tag ok={last?.feuille_de_route_1an==1} label="< 1 an"/>

        </Card>
      </div>

      {/* Qualité fiches */}
      <Card>
        <div style={{display:"flex",flexWrap:"wrap",justifyContent:"space-between",alignItems:"center",gap:12,marginBottom:16}}>
          <p style={{fontWeight:700,fontSize:14,color:"#0f172a"}}>Score qualité des fiches actions</p>
          <div style={{display:"flex",gap:6}}>
            {[{id:"creees",label:"Créées"},{id:"en_cours",label:"En cours"}].map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)}
                style={{padding:"6px 14px",borderRadius:8,border:"1.5px solid",cursor:"pointer",
                  borderColor:tab===t.id?"#1e3a8a":"#e2e8f0",
                  background:tab===t.id?"#1e3a8a":"white",
                  color:tab===t.id?"white":"#475569",
                  fontSize:12,fontWeight:600}}>{t.label}</button>
            ))}
          </div>
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:20,alignItems:"flex-start"}}>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
            <ScoreGauge score={avg} size={72}/>
            <span style={{fontSize:11,color:"#64748b"}}>Score moyen</span>
            {pavg&&<Trend curr={avg} prev={pavg}/>}
          </div>
          <div style={{flex:1,minWidth:200,display:"flex",flexDirection:"column",gap:10}}>
            {scores.map((q,i)=>{
              const pv=pscores[i]?.v;
              return (
                <div key={q.name}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                    <span style={{fontSize:12.5,color:"#374151",fontWeight:500}}>{q.name}</span>
                    <div style={{display:"flex",alignItems:"center",gap:4}}>
                      <span style={{fontSize:13,fontWeight:700,color:q.c}}>{q.v.toFixed(2)}</span>
                      {pv!=null&&<Trend curr={q.v} prev={pv}/>}
                    </div>
                  </div>
                  <div style={{height:8,borderRadius:99,background:"#e5e7eb",overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${(q.v/5)*100}%`,background:q.c,borderRadius:99,transition:"width .5s"}}/>
                  </div>

              );
            })}
          </div>
          <div style={{flex:"0 0 auto"}}>
            <ResponsiveContainer width={185} height={170}>
              <RadarChart data={scores.map(q=>({subject:q.name,score:q.v,fullMark:5}))}>
                <PolarGrid stroke="#f1f5f9"/>
                <PolarAngleAxis dataKey="subject" tick={{fontSize:10,fill:"#475569"}}/>
                <PolarRadiusAxis domain={[0,5]} tick={false}/>
                <Radar dataKey="score" stroke="#c9a84c" fill="#c9a84c" fillOpacity={0.3} strokeWidth={2}/>
              </RadarChart>
            </ResponsiveContainer>
          </div>
        </div>
      </Card>

      {/* Évolution */}
      <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
        <Card style={{flex:1,minWidth:260}}>
          <p style={{fontWeight:700,fontSize:14,color:"#0f172a",marginBottom:14}}>Créées & Stock en cours</p>
          <ResponsiveContainer width="100%" height={200}>
            <BarChart data={rows.map(r=>({trimestre:r.trimestre,"Créées":+r.creees,"En cours":+r.en_cours}))} barCategoryGap="30%">
              <CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9"/>
              <XAxis dataKey="trimestre" tick={{fontSize:11}}/><YAxis tick={{fontSize:11}}/>
              <Tooltip contentStyle={{borderRadius:8,fontSize:12}}/><Legend wrapperStyle={{fontSize:12}}/>
              <Bar dataKey="Créées" fill="#1e3a8a" radius={[4,4,0,0]}/>
              <Bar dataKey="En cours" fill="#93c5fd" radius={[4,4,0,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </Card>
        <Card style={{flex:1,minWidth:260}}>
          <p style={{fontWeight:700,fontSize:14,color:"#0f172a",marginBottom:14}}>Actualisées dans les 3 mois (%)</p>
          <ResponsiveContainer width="100%" height={200}>
            <LineChart data={rows.map(r=>({trimestre:r.trimestre,"% Actualisées":+r.pct_actualisees}))}>
              <CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9"/>
              <XAxis dataKey="trimestre" tick={{fontSize:11}}/><YAxis domain={[0,100]} unit="%" tick={{fontSize:11}}/>
              <Tooltip contentStyle={{borderRadius:8,fontSize:12}}/><Legend wrapperStyle={{fontSize:12}}/>
              <Line type="monotone" dataKey="% Actualisées" stroke="#16a34a" strokeWidth={2.5} dot={{r:4}}/>
            </LineChart>
          </ResponsiveContainer>
        </Card>
      </div>
    </div>
  );
}

/* ─── APP PRINCIPALE ──────────────────────────────────── */
const TABS=[
  {id:"carte",        label:"Carte",             icon:"🗺️"},
  {id:"barometre",    label:"Baromètre",          icon:"📊"},
  {id:"frequentation",label:"Fréquentation RPE",  icon:"📈"},
  {id:"fiches",       label:"Fiches Actions",     icon:"📄"},
];

function App() {
  const [auth,setAuth]=useState(false);
  const [loading,setLoading]=useState(false);
  const [allData,setAllData]=useState(null);
  const [loadErr,setLoadErr]=useState(null);
  const [selRegion,setSelRegion]=useState(null);
  const [selCLPE,setSelCLPE]=useState(null);
  const [tab,setTab]=useState("carte");

  // Charger les CSV dès que l'utilisateur est authentifié
  useEffect(()=>{
    if(!auth||allData)return;
    setLoading(true);
    loadAllData()
      .then(d=>{setAllData(d);setLoading(false);})
      .catch(e=>{setLoadErr(e.message);setLoading(false);});
  },[auth]);

  const pickRegion=useCallback(r=>{setSelRegion(r);setSelCLPE(null);},[]);
  const pickCLPE=useCallback(c=>{
    setSelCLPE(c);
    if(c){setSelRegion(REGIONS.find(r=>r.id===c.regionId));setTab("barometre");}
  },[]);
  const fromDropdown=useCallback(e=>{
    const c=CLPES.find(c=>c.id===e.target.value);
    if(!c){setSelCLPE(null);return;}
    setSelCLPE(c);setSelRegion(REGIONS.find(r=>r.id===c.regionId));
  },[]);

  if(!auth)return <LoginScreen onLogin={()=>setAuth(true)}/>;
  if(loading)return <LoadingScreen/>;
  if(loadErr)return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{fontSize:44}}>⚠️</div>
      <p style={{fontSize:15,fontWeight:600,color:"#dc2626"}}>Impossible de charger les données</p>
      <p style={{fontSize:13,color:"#64748b",maxWidth:420,textAlign:"center"}}>{loadErr}</p>
      <p style={{fontSize:12,color:"#94a3b8",maxWidth:420,textAlign:"center"}}>
        Vérifiez que les fichiers <code>data/barometre.csv</code>, <code>data/frequentation_rpe.csv</code> et <code>data/fiches_actions.csv</code> sont bien présents dans le dépôt GitHub et que GitHub Pages est activé.
      </p>
    </div>
  );
  if(!allData)return null;

  return (
    <div style={{minHeight:"100vh",background:"#f1f5f9"}}>
      {/* HEADER */}
      <header style={{background:"linear-gradient(135deg,#0f172a 0%,#1e3a5f 100%)",
        position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 20px rgba(0,0,0,.25)"}}>
        <div style={{maxWidth:1280,margin:"0 auto",padding:"0 20px"}}>
          <div style={{display:"flex",alignItems:"center",gap:16,paddingTop:12,paddingBottom:6}}>
            <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
              <span style={{fontSize:24}}>🏛️</span>
              <div>
                <div style={{fontFamily:"'Spectral',serif",color:"white",fontWeight:700,fontSize:15,lineHeight:1.2}}>
                  Observatoire CLPE</div>
                <div style={{color:"#93c5fd",fontSize:11}}>Comités Locaux Pour l'Emploi</div>
              </div>
            </div>
            <div style={{height:32,width:1,background:"rgba(255,255,255,.15)",flexShrink:0}}/>
            <div style={{flex:1,maxWidth:420}}>
              <select value={selCLPE?.id||""} onChange={fromDropdown}
                style={{width:"100%",padding:"8px 12px",borderRadius:8,
                  border:"1px solid rgba(255,255,255,.2)",background:"rgba(255,255,255,.1)",
                  color:"white",fontSize:13,outline:"none",cursor:"pointer"}}>
                <option value="">— Sélectionner un CLPE —</option>
                {REGIONS.map(r=>{
                  const rc=CLPES.filter(c=>c.regionId===r.id);
                  if(!rc.length)return null;
                  return <optgroup key={r.id} label={r.nom}>
                    {rc.map(c=><option key={c.id} value={c.id}>{c.nom}</option>)}
                  </optgroup>;
                })}
              </select>
            </div>
            {selCLPE&&(
              <div style={{display:"flex",alignItems:"center",gap:8,background:"rgba(255,255,255,.1)",
                borderRadius:8,padding:"6px 12px",flexShrink:0}}>
                <div style={{width:8,height:8,borderRadius:"50%",
                  background:REGIONS.find(r=>r.id===selCLPE.regionId)?.color||"#94a3b8"}}/>
                <span style={{color:"white",fontSize:12,fontWeight:600}}>{selCLPE.nom}</span>
                <button onClick={()=>setSelCLPE(null)}
                  style={{background:"none",border:"none",color:"#93c5fd",cursor:"pointer",fontSize:16,lineHeight:1,padding:0}}>×</button>
              </div>
            )}
            <button onClick={()=>setAuth(false)}
              style={{marginLeft:"auto",background:"none",border:"1px solid rgba(255,255,255,.2)",
                color:"#94a3b8",borderRadius:6,padding:"6px 12px",cursor:"pointer",fontSize:12,flexShrink:0}}>
              Déconnexion</button>
          </div>
          {/* Onglets */}
          <div style={{display:"flex",gap:2}}>
            {TABS.map(t=>{
              const isA=tab===t.id;
              return (
                <button key={t.id} onClick={()=>setTab(t.id)}
                  style={{display:"flex",alignItems:"center",gap:7,padding:"10px 18px",
                    border:"none",borderRadius:"8px 8px 0 0",cursor:"pointer",
                    fontSize:13,fontWeight:600,transition:"all .2s",
                    background:isA?"#f1f5f9":"transparent",
                    color:isA?"#1e3a5f":"#93c5fd"}}
                  onMouseEnter={e=>{if(!isA){e.currentTarget.style.background="rgba(255,255,255,.08)";e.currentTarget.style.color="white";}}}
                  onMouseLeave={e=>{if(!isA){e.currentTarget.style.background="transparent";e.currentTarget.style.color="#93c5fd";}}}>
                  <span>{t.icon}</span><span>{t.label}</span>
                </button>
              );
            })}
          </div>
        </div>
      </header>

      {/* CONTENU */}
      <main style={{maxWidth:1280,margin:"0 auto",background:"white",
        minHeight:"calc(100vh - 110px)",boxShadow:"0 0 0 1px #e2e8f0"}}>
        {tab==="carte"&&<MapView selRegion={selRegion} selCLPE={selCLPE} allData={allData}
          onRegion={pickRegion} onCLPE={pickCLPE}
          onBack={()=>{setSelRegion(null);setSelCLPE(null);}}/>}
        {tab==="barometre"&&    <BarometreView clpe={selCLPE} allData={allData}/>}
        {tab==="frequentation"&&<FreqView      clpe={selCLPE} allData={allData}/>}
        {tab==="fiches"&&       <FichesView    clpe={selCLPE} allData={allData}/>}
      </main>

      <footer style={{maxWidth:1280,margin:"0 auto",padding:"12px 24px",
        display:"flex",justifyContent:"space-between",alignItems:"center",
        borderTop:"1px solid #e2e8f0",background:"white"}}>
        <span style={{fontSize:11,color:"#94a3b8"}}>Ministère du Travail · Observatoire CLPE · v2.0</span>
        <span style={{fontSize:11,color:"#94a3b8"}}>Sources : data/barometre.csv · frequentation_rpe.csv · fiches_actions.csv</span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
